<ui:composition xmlns="http://www.w3.org/1999/xhtml" xmlns:h="jakarta.faces.html" xmlns:f="jakarta.faces.core"
    xmlns:p="http://primefaces.org/ui" xmlns:ui="jakarta.faces.facelets">
    <div class="card">
        <h:form>
            <p:growl id="messages" />
            <p:menubar hideDelay="1000">
                <f:facet name="start">
                    <h:link outcome="/index.xhtml" style="text-decoration: none;">
                        <h2 class="m-0 mr-4 text-primary">Green Market</h2>
                    </h:link>
                </f:facet>

                <p:menuitem value="Shop" icon="pi pi-fw pi-shopping-bag" outcome="/shop/shop.xhtml" />
                <p:menuitem value="Article" icon="pi pi-fw pi-pencil" outcome="/article/article.xhtml" />

                <f:facet name="end">
                    <div class="flex align-items-center gap-3">

                        <div class="ui-input-icon-left">
                            <i class="pi pi-fw pi-search" />
                            <p:inputText placeholder="Search" />
                        </div>

                        <p:button icon="pi pi-shopping-cart"
                            styleClass="ui-button-rounded ui-button-flat ui-button-secondary" title="ตะกร้าสินค้า" />

                        <p:toggleSwitch value="#{selectBooleanView.value2}" onIcon="pi pi-moon" offIcon="pi pi-sun" />

                        <p:button value="Login" icon="pi pi-user" styleClass="ui-button-success" />
                    </div>
                </f:facet>
            </p:menubar>
        </h:form>
    </div>
</ui:composition>
