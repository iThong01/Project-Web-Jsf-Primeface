<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:f="jakarta.faces.core"
      xmlns:p="http://primefaces.org/ui"
      xmlns:ui="jakarta.faces.facelets">

    <h:head>
        <title>Green Market Admin</title>
        <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
        <h:outputStylesheet library="webjars" name="primeflex/3.3.1/primeflex.min.css" />
        <h:outputScript name="js/primeblocks.js" />
    </h:head>

    <h:body>
        <ui:include src="partials/navbar.xhtml" />
        <div class="card">
            <span class="ui-float-label">
                <p:inputText id="float-input" value="#{inputTextView.text}"/>
                <p:outputLabel for="@previous" value="Name"/>
            </span>
        </div>
        <span class="ui-float-label">
            <p:inputText id="float-input" value="#{inputTextView.text}"/>
            <p:outputLabel for="@previous" value="Last Name"/>
        </span>
        <div class="field col-12 md:col-4">
            <p:outputLabel for="navigator" value="Birth Day" />
            <p:datePicker id="navigator" value="#{calendarView.date2}" monthNavigator="true" yearNavigator="true" showWeek="true" />
        </div>
        <span class="ui-float-label">
            <p:inputText id="float-input" value="#{inputTextView.text}"/>
            <p:outputLabel for="@previous" value="Username"/>
        </span>
        <span class="ui-float-label">
            <p:inputText id="float-input" value="#{inputTextView.text}"/>
            <p:outputLabel for="@previous" value="Password"/>
        </span>
        <div class="card">
            <h:form>
                <h5 class="mt-0">Confirm Password</h5>
                <div class="field grid">
                    <p:outputLabel for="pwd1" styleClass="col-fixed" style="width:100px" value="Password"/>
                    <div class="col">
                        <p:password id="pwd1" value="#{passwordView.password5}" match="pwd2" label="Password 1" toggleMask="true" required="true"/>
                    </div>
                </div>

                <div class="field grid">
                    <p:outputLabel for="pwd2" styleClass="col-fixed" style="width:100px" value="Password"/>
                    <div class="col">
                        <p:password id="pwd2" value="#{passwordView.password5}" label="Password 2" toggleMask="true" required="true"/>
                    </div>
                </div>

                <p:commandButton update="@form" value="Save"/>

                <p:messages id="messages" showDetail="true">
                    <p:autoUpdate/>
                </p:messages>
            </h:form>
        </div>
        <ui:include src="partials/footer.xhtml" />
    </h:body>
</html>
