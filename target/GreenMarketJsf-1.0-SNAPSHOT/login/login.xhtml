<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:h="jakarta.faces.html" xmlns:f="jakarta.faces.core"
    xmlns:p="http://primefaces.org/ui" xmlns:ui="jakarta.faces.facelets">

<h:head>
    <title>Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <h:outputStylesheet library="webjars" name="primeflex/3.3.1/primeflex.min.css" />
    <h:outputScript name="js/primeblocks.js" />
</h:head>

<h:body>
    <div class="flex align-items-center justify-content-center">
        <div class="surface-card p-4 shadow-2 border-round w-full lg:w-6">
            <div class="text-center mb-5">
                <!-- <p:graphicImage name="images/blocks/logos/hyper.svg" library="primeblocks-app" alt="Image" height="50"
                    styleClass="mb-3" /> -->
                <div class="text-900 text-3xl font-medium mb-3">Welcome Back</div>
                <span class="text-600 font-medium line-height-3">Don't have an account?</span>
                
                    <p:link outcome="register.xhtml" value="Create today!" class="font-medium no-underline ml-2 text-blue-500 cursor-pointer"></p:link>
                
            </div>

            <h:form id="loginForm">
                <p:messages id="messages" showDetail="true" closable="true">
                    <p:autoUpdate />
                </p:messages>
                <div>
                    <label for="username" class="block text-900 font-medium mb-2">Username</label>
                    <p:inputText id="username" value="#{authBean.user}" required="true"
                        requiredMessage="กรุณากรอก Username" styleClass="w-full mb-3" placeholder="username...." />
                    <label for="password1" class="block text-900 font-medium mb-2">Password</label>
                    <p:password id="password" value="#{authBean.password}" required="true"
                        requiredMessage="กรุณากรอกรหัสผ่าน" styleClass="w-full mb-3" placeholder="password...." />

                    <div class="flex align-items-center justify-content-between mb-6">
                        <div class="flex align-items-center">
                            <p:selectBooleanCheckbox id="rememberme" value="#{authBean.rememberMe}" styleClass="mr-2" />
                            <label for="rememberme">Remember me</label>
                        </div>
                        <a class="font-medium no-underline ml-2 text-blue-500 text-right cursor-pointer">Forgot your
                            password?</a>
                    </div>

                    <p:commandButton value="Sign In" action="#{authBean.login}" icon="pi pi-user"
                        styleClass="w-full" />

                </div>
            </h:form>
        </div>
    </div>
</h:body>

</html>
