<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:f="jakarta.faces.core"
      xmlns:p="http://primefaces.org/ui"
       xmlns:ui="jakarta.faces.facelets">
    <h:head>
        <title>Create Product</title>
        <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    </h:head>
    <h:body>
                <ui:include src="../partials/navbar.xhtml" />

        <div class="container p-4">
            <h1 style="color: #2e7d32;" class="text-center mb-4">ระบบจัดการสินค้า</h1>

            <h:form id="shopRedirectForm">
                <div class="flex justify-content-end mb-3">
                    <p:commandButton value="ดูหน้าร้านค้าของลูกค้า"
                                     action="shop/shop?faces-redirect=true" 
                                     icon="pi pi-shopping-bag"
                                     styleClass="ui-button-info" />
                </div>
            </h:form>

            <h:form id="productForm">
                <p:panel header="เพิ่มสินค้าใหม่" styleClass="mb-4">
                    <div class="grid p-fluid">
                        <div class="col-12 md:col-6 field">
                            <p:outputLabel for="name" value="ชื่อสินค้า:" />
                            <p:inputText id="name" value="#{productBean.newProduct.name}" required="true" requiredMessage="กรุณากรอกชื่อสินค้า" />
                        </div>
                        <div class="col-12 md:col-6 field">
                            <p:outputLabel for="price" value="ราคา:" />
                            <p:inputNumber id="price" value="#{productBean.newProduct.price}" symbol=" ฿" symbolPosition="s" required="true" />
                        </div>
                        <div class="col-12 md:col-6 field">
                            <p:outputLabel for="count" value="จำนวน:" />
                            <p:spinner id="count" value="#{productBean.newProduct.count}" min="0" required="true" />
                        </div>
                        <div class="col-12 md:col-6 field">
                            <p:outputLabel for="desc" value="รายละเอียด:" />
                            <p:inputTextarea id="desc" value="#{productBean.newProduct.description}" rows="3" />
                        </div>
                    </div>

                    <div class="flex justify-content-center mt-3">
                        <p:commandButton value="บันทึกข้อมูล" action="#{productBean.saveProduct}" 
                                         update="productForm productTable" icon="pi pi-save" 
                                         styleClass="ui-button-success w-full md:w-auto px-6"/>
                    </div>

                    <p:messages id="messages" showDetail="true" closable="true">
                        <p:autoUpdate/>
                    </p:messages>
                </p:panel>
            </h:form>

            <h:form id="productTable">
                <p:dataTable var="p" value="#{productBean.productList}"
                             emptyMessage="ยังไม่มีข้อมูลสินค้าในระบบ หรือการเชื่อมต่อฐานข้อมูลล้มเหลว"
                             paginator="true" rows="5"
                             styleClass="shadow-2">

                    <p:column headerText="ชื่อสินค้า">
                        <h:outputText value="#{p.name}" />
                    </p:column>

                    <p:column headerText="ราคา" width="15%">
                        <h:outputText value="#{p.price}">
                            <f:convertNumber type="currency" currencySymbol="฿" />
                        </h:outputText>
                    </p:column>

                    <p:column headerText="จำนวน" width="15%">
                        <h:outputText value="#{p.count}" />
                    </p:column>
                </p:dataTable>
            </h:form>
        </div>

        <ui:include src="../partials/footer.xhtml" />
    </h:body>\
</html>
