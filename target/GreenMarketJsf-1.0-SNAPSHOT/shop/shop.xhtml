<ui:composition xmlns="http://www.w3.org/1999/xhtml" xmlns:h="jakarta.faces.html" xmlns:f="jakarta.faces.core"
    xmlns:p="http://primefaces.org/ui" xmlns:ui="jakarta.faces.facelets" template="/templates/master.xhtml">
    <ui:define name="title">Shop - Green Market</ui:define>

        <ui:define name="head">
            <style>
                .product-grid-item {
                    border: 1px solid var(--surface-border);
                    border-radius: 6px;
                    padding: 1rem;
                    height: 100%;
                    display: flex;
                    flex-direction: column;
                }

                .product-grid-item-content {
                    flex-grow: 1;
                    display: flex;
                    flex-direction: column;
                    align-items: center;
                    text-align: center;
                }
            </style>
        </ui:define>

        <ui:define name="content">
            <div class="product card p-4 mt-4">
                <h:form>
                    <div style="margin-bottom: 20px;" class="flex justify-content-between align-items-center">
                        <h2 class="m-0 text-primary">All Products</h2>
                        <p:button value="ระบบจัดการหลังบ้าน" outcome="/shop/manage.xhtml" icon="pi pi-cog"
                            styleClass="ui-button-secondary ui-button-outlined" 
                            rendered="#{not empty authBean.currentUser and authBean.currentUser.role eq 'admin'}" />
                    </div>
                </h:form>

                <h:form id="form">
                    <p:dataView var="p" value="#{productBean.productList}" rows="12" paginator="true" paginatorTemplate="{CurrentPageReport} {FirstPageLink} {PreviousPageLink} 
                                {PageLinks} {NextPageLink} {LastPageLink}" gridIcon="pi pi-th-large"
                        listIcon="pi pi-bars" layout="grid" gridRowStyleClass="lg:col-6 xl:col-4" flex="true">

                        <p:dataViewGridItem>
                            <div class="product-grid-item shadow-1 m-2">
                                <div class="flex justify-content-between align-items-center mb-3">
                                    <div class="flex align-items-center">
                                        <i class="pi pi-tag product-category-icon mr-2" />

                                        <span class="product-category font-semibold">สมุนไพร</span>
                                    </div>

                                    <span
                                        class="product-badge #{p.count > 0 ? 'status-instock text-green-500' : 'status-outofstock text-red-500'}">
                                        #{p.count > 0 ? 'IN STOCK' : 'OUT OF STOCK'}
                                    </span>
                                </div>

                                <div class="product-grid-item-content">
                                    <h:panelGroup rendered="#{not empty p.base64Image}">
                                        <img src="data:image/jpeg;base64,#{p.base64Image}"
                                             style="width: 300px; height: 280px; object-fit: cover; border-radius: 6px; box-shadow: 0 3px 6px rgba(0,0,0,0.16), 0 3px 6px
                                     rgba(0,0,0,0.23);" class="mb-3" />
                                    </h:panelGroup>

                                    <div class="text-2xl font-bold mb-2">#{p.name}</div>
                                    <div class="text-600 mb-3 line-height-3">#{p.description}</div>
                                </div>

                                <div class="flex align-items-center justify-content-between mt-auto">
                                    <h:outputText value="$#{p.price}" styleClass="text-2xl font-semibold">
                                        <f:convertNumber pattern="#0.00" />
                                    </h:outputText>
                                    <p:commandButton type="button" value="Add" icon="pi pi-shopping-cart"
                                        disabled="#{p.count == 0 }" styleClass="ui-button-success" />
                                </div>
                            </div>
                        </p:dataViewGridItem>

                        <p:dataViewListItem>
                            <div
                                class="flex flex-column md:flex-row align-items-center p-3 border-bottom-1 surface-border">
                                <h:panelGroup rendered="#{not empty p.base64Image}">
                                        <img src="data:image/jpeg;base64,#{p.base64Image}"
                                             style="width: 150px; height: 150px; object-fit: cover; border-radius: 6px;"
                                             class="md:mr-5 mb-3 md:mb-0 shadow-2" />
                                    </h:panelGroup>

                                <div class="flex-grow-1 flex flex-column justify-content-center align-items-center md:align-items-start md:mr-5">
                                    <div class="text-2xl font-bold text-900 mb-2">#{p.name}</div>
                                    <div class="text-600 mb-3 line-height-3">#{p.description}</div>
                                    <div class="flex align-items-center">
                                        <i class="pi pi-tag mr-2"></i>
                                        <span class="font-semibold">สมุนไพร</span>
                                    </div>
                                </div>

                                <div class="flex flex-row md:flex-column justify-content-between align-items-center md:align-items-end mt-3 md:mt-0 md:w-10rem">
                                    <h:outputText value="$#{p.price}" styleClass="text-2xl font-semibold mb-2">
                                        <f:convertNumber pattern="#0.00" />
                                    </h:outputText>
                                    <span class="#{p.count > 0 ? 'text-green-500' : 'text-red-500'} font-bold mb-3">
                                        #{p.count > 0 ? 'IN STOCK' : 'OUT OF STOCK'}
                                    </span>
                                    <p:commandButton type="button" value="Add to Cart" icon="pi pi-shopping-cart"
                                        disabled="#{p.count == 0}" styleClass="ui-button-success" />
                                </div>
                            </div>
                        </p:dataViewListItem>
                    </p:dataView>
                </h:form>
            </div>
        </ui:define>
</ui:composition>
