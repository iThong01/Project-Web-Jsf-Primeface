<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:h="jakarta.faces.html" xmlns:f="jakarta.faces.core"
    xmlns:p="http://primefaces.org/ui" xmlns:ui="jakarta.faces.facelets">

<h:head>
    <title>Green Market Admin</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <h:outputStylesheet library="webjars" name="primeflex/3.3.1/primeflex.min.css" />
    <h:outputScript name="js/primeblocks.js" />
</h:head>

<h:body>
    <div class="flex align-items-center justify-content-center min-h-screen">
        <div class="card w-full border-1 border-round border-300 p-4" style="max-width: 480px;">
            <h:form>
                <div class="text-center mb-5">
                    <i class="pi pi-user-plus text-4xl text-primary mb-3"></i>
                    <div class="text-900 text-3xl font-medium mb-2">Create an Account</div>
                    <span class="text-600 font-medium line-height-3">Already have an account?</span>
                    <p:link outcome="/login/login.xhtml" value="Login here"
                        styleClass="font-medium no-underline ml-2 text-primary cursor-pointer" />
                </div>
                <div class="formgrid grid">
                    <div class="field col-12 md:col-6">
                        <span class="ui-float-label">
                            <p:inputText id="firstName" value="#{authBean.firstName}" />
                            <p:outputLabel for="firstName" value="Name" />
                        </span>
                    </div>
                    <div class="field col-12 md:col-6">
                        <span class="ui-float-label">
                            <p:inputText id="lastName" value="#{authBean.lastName}" />
                            <p:outputLabel for="lastName" value="Last Name" />
                        </span>
                    </div>
                    <div class="field col-12 ">
                        <span class="ui-float-label">
                            <p:datePicker id="birthDay" value="#{authBean.birthDay}" monthNavigator="true"
                            yearNavigator="true" showWeek="true" showIcon="true" />
                            <p:outputLabel for="@previous" value="Birth Day" />
                        </span>
                    </div>
                    <div class="field col-12">
                        <span class="ui-float-label">
                            <p:inputText id="email" value="#{authBean.email}" />
                            <p:outputLabel for="email" value="Email" />
                        </span>
                    </div>
                    <div class="field col-12">
                        <span class="ui-float-label">
                            <p:inputText id="user" value="#{authBean.user}" />
                            <p:outputLabel for="user" value="Username" />
                        </span>
                    </div>
                </div>


                <h5 class="mt-0">Confirm Password</h5>
                <div class="field grid">
                    <p:outputLabel for="pwd1" styleClass="col-fixed" style="width:100px" value="Password" />
                    <div class="col">
                        <p:password id="pwd1" value="#{authBean.password}" match="pwd2" label="Password 1"
                            toggleMask="true" required="true" />
                    </div>
                </div>

                <div class="field grid">
                    <p:outputLabel for="pwd2" styleClass="col-fixed" style="width:100px" value="Confirm Password" />
                    <div class="col">
                        <p:password id="pwd2" label="Password 2" toggleMask="true" required="true" />
                    </div>
                </div>

                <p:commandButton action="#{authBean.register}" update="@form" value="Register Now" />

                <p:messages id="messages" showDetail="true">
                    <p:autoUpdate />
                </p:messages>
            </h:form>
        </div>
    </div>
</h:body>

</html>
