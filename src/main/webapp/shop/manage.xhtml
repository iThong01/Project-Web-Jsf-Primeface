<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                    xmlns:h="jakarta.faces.html"
                    xmlns:f="jakarta.faces.core"
                    xmlns:p="http://primefaces.org/ui"
                    xmlns:ui="jakarta.faces.facelets"
                    template="/templates/master.xhtml">
   
        <ui:define name="title">Manage Product</ui:define>
   
        <ui:define name="content">
            <div class="container p-4 mt-6">
                <h1 class="text-center mb-4 text-primary">ระบบจัดการสินค้า</h1>
   
                <h:form id="shopRedirectForm">
                    <div class="flex justify-content-end mb-3">
                        <p:button value="ดูหน้าร้านค้าของลูกค้า"
                                  outcome="/index.xhtml"
                                  icon="pi pi-shopping-bag"
                                  styleClass="ui-button-info" />
                    </div>
                </h:form>
   
                <h:form id="productForm" enctype="multipart/form-data">
                    <p:panel header="#{empty productBean.newProduct.id ? 'เพิ่มสินค้าใหม่' : 'แก้ไขสินค้า'}" styleClass="mb-4 shadow-2" id="productPanel">
                        <div class="grid p-fluid">
                            <div class="col-12 md:col-6 field">
                                <p:outputLabel for="name" value="ชื่อสินค้า:" />
                                <p:inputText id="name" value="#{productBean.newProduct.name}" required="true" requiredMessage="กรุณากรอกชื่อสินค   ค้า"/>
                            </div>
                            <div class="col-12 md:col-6 field">
                                <p:outputLabel for="price" value="ราคา:" />
                                <p:inputNumber id="price" value="#{productBean.newProduct.price}" symbol=" $" symbolPosition="p" required="true"/>
                            </div>
                            <div class="col-12 md:col-6 field">
                                <p:outputLabel for="count" value="จำนวน:" />
                                <p:spinner id="count" value="#{productBean.newProduct.count}" min="0" required="true" />
                            </div>
                            <div class="col-12 md:col-6 field">
                                <p:outputLabel for="desc" value="รายละเอียด:" />
                                <p:inputTextarea id="desc" value="#{productBean.newProduct.description}" rows="3" />
                            </div>
   
                            <div class="col-12 field">
                                <p:outputLabel for="imageUpload" value="รูปภาพสินค้า:" />
                                <p:fileUpload id="imageUpload" value="#{productBean.uploadedImage}" 
                                    mode="simple" skinSimple="true"
                                    accept="image/*" />
                            </div>
                        </div>
   
                        <div class="flex justify-content-center mt-3">
                            <p:commandButton value="บันทึกข้อมูล" action="#{productBean.saveProduct}"
                                             ajax="false" icon="pi pi-save"
                                             styleClass="ui-button-success w-full md:w-auto px-6"/>
                        </div>
   
                        <p:messages id="messages" showDetail="true" closable="true">
                            <p:autoUpdate/>
                        </p:messages>
                    </p:panel>
                </h:form>
   
                <h:form id="productTableForm">
                    <p:dataTable var="p" value="#{productBean.productList}"
                                 emptyMessage="ยังไม่มีข้อมูลสินค้าในระบบ"
                                 paginator="true" rows="5"
                                 styleClass="shadow-2">
   
                        <p:column headerText="รูปภาพ" width="15%" styleClass="text-center">
                            <h:panelGroup rendered="#{not empty p.base64Image}">
                                        <img src="data:image/jpeg;base64,#{p.base64Image}"
                                             style="width: 100px; height: 100px; object-fit: cover; border-radius: 6px; box-shadow: 0 3px 6px rgba(0,0,0,0.16), 0 3px 6px
                                     rgba(0,0,0,0.23);" class="mb-3" />
                                    </h:panelGroup>
                            <h:outputText value="ไม่มีรูป" rendered="#{empty p.base64Image}" styleClass="text-500" />
                        </p:column>
   
                        <p:column headerText="ชื่อสินค้า">
                            <h:outputText value="#{p.name}" />
                        </p:column>
                        
                        <p:column headerText="รายละเอียด" >
                            <h:outputText value="#{p.description}" />
                        </p:column>

                        <p:column headerText="ราคา" width="15%">
                            <h:outputText value="$#{p.price}">
                                <f:convertNumber pattern="#0.00" />
                            </h:outputText>
                        </p:column>
   
                        <p:column headerText="จำนวน" width="15%">
                            <h:outputText value="#{p.count}" />
                        </p:column>
   
                        <p:column headerText="จัดการ" width="15%" styleClass="text-center">
                            <p:commandButton icon="pi pi-pencil" 
                                             styleClass="ui-button-warning ui-button-flat mr-2" 
                                             title="แก้ไข"
                                             action="#{productBean.editProduct(p)}"
                                             update=":productForm" />
                            
                            <p:commandButton icon="pi pi-trash" 
                                             styleClass="ui-button-danger ui-button-flat" 
                                             title="ลบ"
                                             action="#{productBean.deleteProduct(p)}"
                                             update=":productTableForm :productForm:messages">
                                <p:confirm header="ยืนยันการลบ" message="คุณต้องการลบสินค้านี้ใช่หรือไม่?" icon="pi pi-exclamation-triangle" />
                            </p:commandButton>
                        </p:column>
                    </p:dataTable>
   
                    <p:confirmDialog global="true" showEffect="fade" hideEffect="fade" responsive="true" width="350">
                        <p:commandButton value="ไม่" type="button" styleClass="ui-confirmdialog-no ui-button-flat"/>
                        <p:commandButton value="ใช่, ลบเลย" type="button" styleClass="ui-confirmdialog-yes ui-button-danger" />
                    </p:confirmDialog>
                </h:form>
            </div>
   
        </ui:define>
    </ui:composition>
