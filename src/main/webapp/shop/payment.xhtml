<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:h="jakarta.faces.html"
                xmlns:f="jakarta.faces.core"
                xmlns:p="http://primefaces.org/ui"
                xmlns:ui="jakarta.faces.facelets"
                template="/templates/master.xhtml">
    <ui:define name="title">Payment - Green Market</ui:define>

    <ui:define name="content">
        <div class="flex justify-content-center mt-4">
            <div class="card p-5 shadow-3" style="max-width: 500px; width: 100%;">
                <h:form id="paymentForm">
                    <p:messages id="messages" showDetail="true" closable="true">
                        <p:autoUpdate/>
                    </p:messages>

                    <div class="text-center mb-4">
                        <h2 class="text-primary mb-2">QR Code Payment</h2>
                        <p class="text-600">Please scan the QR code.</p>
                    </div>

                    <div class="flex justify-content-center mb-4">
                        <div class="border-round p-4" style="background: white; border: 2px dashed #4caf50;">
                            <p:barcode value="PromptPay Simulator: #{cartBean.totalPrice} Baht" type="qr" format="svg" width="200" height="200" />
                        </div>
                    </div>

                    <div class="text-center mb-4 border-bottom-1 surface-border pb-3">
                        <div class="text-xl">Total Amount to Pay:</div>
                        <div class="text-3xl font-bold text-green-600 mt-2">
                            <h:outputText value="$#{cartBean.totalPrice}">
                                <f:convertNumber pattern="#0.00" />
                            </h:outputText>
                        </div>
                    </div>

                    <div class="text-center">
                        <p:commandButton action="#{paymentBean.processPayment}" 
                                         ajax="false"
                                         value="Simulate Payment Success" 
                                         icon="pi pi-check-circle" 
                                         styleClass="ui-button-success w-full p-3 text-lg font-bold" />
                        
                        <div class="mt-3">
                            <p:button outcome="/shop/basket.xhtml" value="Cancel and Go Back" icon="pi pi-times" styleClass="ui-button-danger ui-button-flat w-full" />
                        </div>
                    </div>
                </h:form>
            </div>
        </div>
    </ui:define>
</ui:composition>
