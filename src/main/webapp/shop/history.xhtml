<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:h="jakarta.faces.html"
                xmlns:f="jakarta.faces.core"
                xmlns:p="http://primefaces.org/ui"
                xmlns:ui="jakarta.faces.facelets"
                template="/templates/master.xhtml">
    <ui:define name="title">History</ui:define>

    <ui:define name="content">
        <div class="card p-4 mt-4 shadow-2 border-round">
            <h:form id="historyForm">
                <p:messages id="messages" showDetail="true" closable="true">
                    <p:autoUpdate/>
                </p:messages>

                <h2 class="mb-4 text-primary">ประวัติการสั่งซื้อ</h2>

                <p:dataTable var="tx" value="#{historyBean.transactions}" 
                             emptyMessage="คุณยังไม่มีประวัติการสั่งซื้อสินค้า"
                             paginator="true" rows="10"
                             styleClass="mb-4"
                             rowKey="#{tx.id}">

                    <p:column headerText="รหัสคำสั่งซื้อ" style="width: 120px; text-align: center;">
                        <h:outputText value="##{tx.id}" class="font-bold text-primary"/>
                    </p:column>

                    <p:column headerText="วันที่สั่งซื้อ">
                        <h:outputText value="#{tx.createAt}">
                            <f:convertDateTime pattern="dd/MM/yyyy HH:mm" timeZone="Asia/Bangkok"/>
                        </h:outputText>
                    </p:column>

                    <p:column headerText="จำนวนสินค้า" style="width: 120px; text-align: center;">
                        <h:outputText value="#{tx.totalitem} ชิ้น"/>
                    </p:column>

                    <p:column headerText="ราคารวม" style="width: 150px; text-align: right;">
                        <h:outputText value="#{tx.totalprice} ฿" class="font-bold text-green-600">
                            <f:convertNumber pattern="#,##0.00"/>
                        </h:outputText>
                    </p:column>

                    <p:column headerText="สถานะ" style="width: 120px; text-align: center;">
                        <span class="product-badge status-instock">#{tx.status}</span>
                    </p:column>

                    <p:column style="width: 100px; text-align: center;">
                        <p:commandButton icon="pi pi-search" title="ดูรายละเอียด"
                                         styleClass="ui-button-rounded ui-button-info ui-button-outlined"
                                         action="#{historyBean.prepareViewDetails(tx)}"
                                         oncomplete="PF('detailsDialog').show()"
                                         update=":historyForm:detailsDialog"/>
                    </p:column>

                </p:dataTable>

                <div class="flex justify-content-end">
                    <p:button outcome="/shop/shop.xhtml" value="กลับไปเลือกซื้อสินค้า" icon="pi pi-shopping-cart" styleClass="ui-button-secondary"/>
                </div>

                <p:dialog id="detailsDialog" header="รายละเอียดคำสั่งซื้อ ##{historyBean.selectedTransaction.id}" 
                          widgetVar="detailsDialog" modal="true" showEffect="fade" hideEffect="fade" 
                          resizable="false" responsive="true" width="800">
                    
                    <h:panelGroup rendered="#{not empty historyBean.selectedTransaction}">
                        <div class="flex justify-content-between mb-4 pb-3 border-bottom-1 surface-border">
                            <div>
                                <div class="text-500 mb-1">วันที่ทำการสั่งซื้อ</div>
                                <div class="font-medium text-lg">
                                    <h:outputText value="#{historyBean.selectedTransaction.createAt}">
                                        <f:convertDateTime pattern="dd MMMM yyyy HH:mm" timeZone="Asia/Bangkok"/>
                                    </h:outputText>
                                </div>
                            </div>
                            <div class="text-right">
                                <div class="text-500 mb-1">สถานะ</div>
                                <span class="product-badge status-instock">#{historyBean.selectedTransaction.status}</span>
                            </div>
                        </div>

                        <p:dataTable var="item" value="#{historyBean.selectedOrderItems}" styleClass="mb-3">
                            
                            <p:column headerText="รูปภาพ" style="width: 100px; text-align: center;">
                                <h:panelGroup rendered="#{not empty item.product.base64Image}">
                                    <img src="data:image/jpeg;base64,#{item.product.base64Image}"
                                         style="width: 60px; height: 60px; object-fit: cover; border-radius: 8px;"
                                         class="shadow-2"/>
                                </h:panelGroup>
                            </p:column>
                            
                            <p:column headerText="ชื่อสินค้า">
                                <h:outputText value="#{item.product.name}" class="font-bold"/>
                            </p:column>
                            
                            <p:column headerText="ราคา/ชิ้น" style="width: 120px; text-align: right;">
                                <h:outputText value="#{item.priceAtPurchase} ฿">
                                    <f:convertNumber pattern="#,##0.00"/>
                                </h:outputText>
                            </p:column>
                            
                            <p:column headerText="จำนวน" style="width: 80px; text-align: center;">
                                <h:outputText value="#{item.quantity}"/>
                            </p:column>
                            
                            <p:column headerText="รวม" style="width: 120px; text-align: right;">
                                <h:outputText value="#{item.totalprice} ฿" class="font-bold text-primary">
                                    <f:convertNumber pattern="#,##0.00"/>
                                </h:outputText>
                            </p:column>
                            
                        </p:dataTable>

                        <div class="flex justify-content-end text-xl font-bold mt-4 pt-3 border-top-1 surface-border">
                            <span class="mr-3">ยอดชำระเงิน:</span>
                            <h:outputText value="#{historyBean.selectedTransaction.totalprice} ฿" class="text-green-600">
                                <f:convertNumber pattern="#,##0.00"/>
                            </h:outputText>
                        </div>
                    </h:panelGroup>
                    
                    <f:facet name="footer">
                        <p:commandButton value="ปิดหน้าต่าง" icon="pi pi-times" onclick="PF('detailsDialog').hide()" class="ui-button-secondary ui-button-flat"/>
                    </f:facet>
                </p:dialog>

            </h:form>
        </div>
    </ui:define>
</ui:composition>
