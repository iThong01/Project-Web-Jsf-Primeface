<ui:composition xmlns="http://www.w3.org/1999/xhtml" xmlns:h="jakarta.faces.html" xmlns:f="jakarta.faces.core"
    xmlns:p="http://primefaces.org/ui" xmlns:ui="jakarta.faces.facelets" template="/templates/master.xhtml">

    <ui:define name="title">Green Market</ui:define>
    <ui:define name="content">
        <div class="grid grid-nogutter surface-section text-800">
            <div class="col-12 md:col-6 p-6 text-center md:text-left flex align-items-center ">
                <section>
                    <span class="block text-6xl font-bold mb-1">Find Your Herb!!! </span>
                    <div class="text-6xl text-primary font-bold mb-3">For Life Longevity</div>
                    <p class="mt-0 mb-4 text-700 line-height-3">Use for your life better than now, for enjoy with
                        family. Discover nature's best remedies.</p>

                    <p:commandButton value="Shop Now!!!" type="button" class="mr-3 ui-button-raised" />
                    <p:commandButton value="About Us" type="button" class="ui-button-outlined" />
                </section>
            </div>
            <div class="col-12 md:col-6 overflow-hidden">
                <p:graphicImage name="photos/tea-599227_640.jpg" alt="Image" styleClass="md:ml-auto block md:h-full"
                    style="clip-path: polygon(8% 0, 100% 0%, 100% 100%, 0 100%)" />
            </div>
        </div>

        <div class="mt-6">
            <div class="text-900 font-bold text-6xl mb-4 text-center">Our product</div>
            <div class="text-700 text-xl mb-6 text-center line-height-3">Explore our natural herbs for your healthy
                life.</div>

            <h:form id="productForm">
                <p:carousel value="#{productBean.productList}" var="p" numVisible="3" numScroll="1" circular="true"
                    autoplayInterval="4000">

                    <div class="p-3 h-full">
                        <div class="shadow-2 p-3 h-full flex flex-column surface-card" style="border-radius: 6px">
                            <h:panelGroup rendered="#{not empty p.base64Image}">
                                <div class="flex justify-content-center w-full mb-3">
                                    <img src="data:image/jpeg;base64,#{p.base64Image}"
                                        style="width: 200px; height: 200px; object-fit: cover; border-radius: 6px; box-shadow: 0 3px 6px rgba(0,0,0,0.16), 0 3px 6px rgba(0,0,0,0.23);"
                                        class="mb-3 align-items-center" />
                                </div>
                            </h:panelGroup>
                            <div class="text-900 font-medium text-xl mb-2 text-center">
                                <h:outputText value="#{p.name}" />
                            </div>
                            <div class="text-600 mb-3 text-center" style="min-height: 3rem;">
                                <h:outputText value="#{p.description}" />
                            </div>

                            <hr class="my-3 mx-0 border-top-1 border-bottom-none surface-border" />

                            <div class="flex align-items-center justify-content-center">
                                <span class="font-bold text-2xl text-900">
                                    <h:outputText value="$#{p.price}">
                                        <f:convertNumber pattern="#0.00" />
                                    </h:outputText>
                                </span>
                            </div>

                            <hr class="mb-3 mx-0 border-top-1 border-bottom-none surface-border mt-auto" />
                            <p:growl id="growl" life="3000" />
                            <h:panelGroup rendered="#{authBean.loggedIn}" class="flex align-items-center justify-content-end gap-2 mb-2">
                                <p:spinner value="#{cartBean.quantityMap[p.id]}" min="1" max="#{p.count}"
                                    disabled="#{p.count == 0}" style="width: 5rem;" />
                                <p:commandButton action="#{cartBean.addToCart(p.id)}" update="@form" process="@form"
                                    value="Add" icon="pi pi-shopping-cart" disabled="#{p.count == 0}"
                                    styleClass="ui-button-success" />
                            </h:panelGroup>
                            
                        </div>
                    </div>
                </p:carousel>
            </h:form>
        </div>
    </ui:define>
</ui:composition>
